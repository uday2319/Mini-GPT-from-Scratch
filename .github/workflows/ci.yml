name: Mini-GPT CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.10

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run basic check
      run: |
        python -c "print('Environment setup successful')"

    - name: Test import
      run: |
        python -c "from model.gpt_model import MiniGPT; print('Model import OK')"